<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desert Smart Glass | Consultation</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-md mx-auto mt-20 p-8 bg-white shadow-lg rounded-xl">
        <h2 class="text-2xl font-bold mb-6 text-center">Tailored Consultation Request</h2>
        <form id="leadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Full Name</label>
                <input type="text" id="name" name="name" required class="w-full p-2 border rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium">Email Address</label>
                <input type="email" id="email" name="email" required class="w-full p-2 border rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium">Phone Number</label>
                <input type="tel" id="phone" name="phone" required class="w-full p-2 border rounded-md">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-md font-semibold hover:bg-blue-700 transition">
                Get My Quote
            </button>
        </form>
        <p id="responseMsg" class="mt-4 text-center hidden"></p>
    </div>

    <script>
        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('responseMsg');
            
            btn.disabled = true;
            btn.innerText = 'Sending...';

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                source: 'Vercel Funnel'
            };

            try {
                const response = await fetch('/api/ghl-relay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    msg.innerText = "Success! We'll be in touch soon.";
                    msg.className = "mt-4 text-center text-green-600 font-bold";
                    document.getElementById('leadForm').reset();
                } else {
                    throw new Error(result.error || 'Submission failed');
                }
            } catch (err) {
                msg.innerText = "Error: " + err.message;
                msg.className = "mt-4 text-center text-red-600";
            } finally {
                msg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'Get My Quote';
            }
        });
    </script>
</body>
</html>
